logging:
  level:
    org.springframework.web.filter.CommonsRequestLoggingFilter: "debug"
spring:
  application:
    name: moneytracker

  datasource:
    url: jdbc:mysql://db:3306/moneytracker
    username: root  # docker-compose.dev.yml-ben nincs megadva username, de alapérték szerint root
    password: root

  jpa:
    hibernate:
      #ddl-auto: validate  # validate: ellenőrzi a séma megfelelőségét, de nem módosítja azt
      ddl-auto: update  # validate: ellenőrzi a séma megfelelőségét, de nem módosítja azt
    show-sql: true



