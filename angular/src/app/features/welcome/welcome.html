<div>
    <h1>welcome</h1>
    <p>
        Welcome to moneytracker, the best app to track your expenses and income.
    </p>
    @if(!userData.isUserLogged()) {
        <p>
            <app-login-component />
        </p>
        <p>
            <button class="btn btn-secondary" (click)="openModal()">Register</button>
        </p>
        
        @if (isModalOpen()) {
            <app-register-modal (closeModal)="closeModal()" />
        }
    }
</div>
