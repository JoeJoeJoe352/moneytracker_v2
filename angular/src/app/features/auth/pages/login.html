<h2>Login</h2>
<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form">
  
  <!-- username -->
  <div class="form-group mb-3">
    <label for="username">Felhasználónév</label>
    <input
      id="username"
      type="text"
      formControlName="username"
      class="form-control"
      autocomplete="username"
      [ngClass]="isUsernameFieldHasError || errorMsg() !== '' ? 'form-input-error' : ''" 
      [readonly]="isLoading()"
    />

  @if (isUsernameFieldHasError) {
      <div class="form-field-error">
        username is required!
      </div>
    }
  </div>

  <!-- password -->
  <div class="form-group mb-3">
    <label for="password">Jelszó</label>
    <input
      id="password"
      type="password"
      formControlName="password"
      class="form-control"
      autocomplete="current-password"
      [ngClass]="isPasswordFieldHasError || errorMsg() !== '' ? 'form-input-error' : ''"
      [readonly]="isLoading()"
    />

    @if (isPasswordFieldHasError) {
      <div class="form-field-error">
        password is required!
      </div>
    }
  </div>

  <button type="submit" [disabled]="isLoading()" class="btn btn-primary">
    Belépés
  </button>

  @if (errorMsg() !== '') {
    <div class="mb-3 form-field-error">{{errorMsg()}}</div>
  }

</form>
