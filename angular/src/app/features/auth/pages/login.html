<h2>Login</h2>
<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form">
  <div class="form-group mb-3">
    <label 
      for="username"
      [ngClass]="isUsernameFieldHasError ? 'form-label-error' : ''"
    >
      Felhasználónév
    </label>
    <input
      id="username"
      type="text"
      formControlName="username"
      class="form-control"
      autocomplete="username"
      [ngClass]="isUsernameFieldHasError ? 'form-input-error' : ''" 
      [readonly]="isLoading()"
    />

    @if (isUsernameFieldHasError) {
      <div class="form-field-error">A felhasználónév kötelező!</div>
    }
  </div>

  <div class="form-group mb-3">
    <label 
      for="password"
      [ngClass]="isPasswordFieldHasError ? 'form-label-error' : ''" 
    >
      Jelszó
    </label>
    <input
      id="password"
      type="password"
      formControlName="password"
      class="form-control"
      autocomplete="current-password"
      [ngClass]="isPasswordFieldHasError ? 'form-input-error' : ''"
      [readonly]="isLoading()"
    />

    @if (isPasswordFieldHasError) {
      <div class="form-field-error">A jelszó kötelező.</div>
    }
  </div>

  @if (errorMsg() !== '') {
    <div class="mb-3 form-field-error">{{errorMsg()}}</div>
  }

  <button type="submit" [disabled]="loginForm.invalid || isLoading()" class="btn btn-primary">
    Belépés
  </button>

</form>
