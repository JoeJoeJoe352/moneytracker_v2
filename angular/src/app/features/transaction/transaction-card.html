<div class="transaction-card-wrapper">
    <div class="transaction-card">
        <div class="card-element transaction-type d-flex">
            <div class="transaction-icon" [class]="isIncome() ? 'income' : 'outcome'">
                @if (isIncome()) {
                    <i class="bi bi-arrow-up-circle-fill"></i>
                } @else {
                    <i class="bi bi-arrow-down-circle-fill"></i>
                }
            </div>

            <div class="transaction-price">
                {{ transaction().priceSum | number  }}
            </div>

        </div>

        <div class="card-element transaction-name">
            {{ transaction().name }}
        </div>

        <div class="card-element transaction-date">
            {{transaction().transactionDate}}
        </div>
    </div>
</div>
